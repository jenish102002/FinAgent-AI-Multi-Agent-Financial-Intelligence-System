services:
  - type: web
    name: finagent-api
    runtime: python
    region: oregon
    plan: free
    rootDir: finagent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
